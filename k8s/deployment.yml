apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustbox
  labels:
    app: rustbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rustbox
  template:
    metadata:
      labels:
        app: rustbox
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: rustbox
          image: rustbox:latest
          ports:
            - containerPort: 4096
          env:
            - name: RUSTBOX_DATABASE_URL
              value: "sqlite:rustbox.db"
            - name: RUSTBOX_WORKERS
              value: "2"
            - name: RUSTBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rustbox-secrets
                  key: api-key
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            seccompProfile:
              type: Unconfined
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                - SETUID
                - SETGID
                - NET_ADMIN
                - MKNOD
                - DAC_OVERRIDE
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4096
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4096
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: rustbox
spec:
  selector:
    app: rustbox
  ports:
    - port: 4096
      targetPort: 4096
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: rustbox-secrets
type: Opaque
stringData:
  api-key: "CHANGE-ME-BEFORE-DEPLOY"

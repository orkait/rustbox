name: rustbox-ci

on:
  push:
    branches: ["**"]
    paths-ignore: ["docs/**", "docs-site/**", "*.md", "LICENSE", "isolate-read-only/**"]
  pull_request:
    paths-ignore: ["docs/**", "docs-site/**", "*.md", "LICENSE", "isolate-read-only/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: oven-sh/setup-bun@v2

      - name: Symlink Bun
        run: sudo ln -sf "$HOME/.bun/bin/bun" /usr/local/bin/bun

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings -A clippy::too_many_arguments -A clippy::type_complexity -A clippy::declare_interior_mutable_const -A clippy::needless_range_loop

      - name: Unit + integration tests
        run: cargo test --all -- --nocapture --test-threads=1

      - name: Compile-fail typestate invariants
        run: cargo test --test trybuild -- --nocapture

  supply-chain-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Unsafe boundary audit
        run: bash scripts/unsafe-audit.sh

      - uses: EmbarkStudios/cargo-deny-action@v2

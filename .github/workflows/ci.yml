name: rustbox-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-core-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build all targets
        run: cargo test --all --no-run

      - name: Run unit + integration tests
        run: cargo test --all -- --nocapture --test-threads=1

  strict-compile-fail-lane:
    runs-on: ubuntu-latest
    needs: build-and-core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile-fail typestate invariants
        run: cargo test --test trybuild -- --nocapture

  supply-chain-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Unsafe boundary audit
        run: bash scripts/unsafe-audit.sh

      - name: Dependency audit (CVEs, licenses, sources)
        uses: EmbarkStudios/cargo-deny-action@v2

name: rustbox-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-core-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build all targets
        run: cargo test --all --no-run

      - name: Run unit + integration tests
        run: cargo test --all -- --nocapture

  strict-compile-fail-lane:
    runs-on: ubuntu-latest
    needs: build-and-core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile-fail typestate invariants
        run: cargo test --test trybuild -- --nocapture

  unsafe-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unsafe boundary audit
        run: bash scripts/unsafe-audit.sh

  fuzz-targets:
    runs-on: ubuntu-latest
    needs: build-and-core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz verdict classifier (30s)
        run: cargo +nightly fuzz run fuzz_verdict -- -max_total_time=30

      - name: Fuzz config deserialization (30s)
        run: cargo +nightly fuzz run fuzz_config_deser -- -max_total_time=30

      - name: Fuzz binding parser (30s)
        run: cargo +nightly fuzz run fuzz_binding_parse -- -max_total_time=30

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rustbox_test
      POSTGRES_USER: rustbox
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustbox -d rustbox_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  node1:
    build:
      context: ../..
      dockerfile: docker/service/Dockerfile
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      RUSTBOX_DATABASE_URL: "postgres://rustbox:testpassword@postgres:5432/rustbox_test"
      RUSTBOX_NODE_ID: "node-1"
      RUSTBOX_PORT: "8080"
      RUSTBOX_WORKERS: "2"
      RUST_LOG: "info"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  node2:
    build:
      context: ../..
      dockerfile: docker/service/Dockerfile
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      RUSTBOX_DATABASE_URL: "postgres://rustbox:testpassword@postgres:5432/rustbox_test"
      RUSTBOX_NODE_ID: "node-2"
      RUSTBOX_PORT: "8080"
      RUSTBOX_WORKERS: "2"
      RUST_LOG: "info"
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

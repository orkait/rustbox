x-judge-common: &judge-common
  build:
    context: .
    dockerfile: Dockerfile
  command: ["/usr/local/bin/judge-service"]
  cap_drop: [ALL]
  cap_add: [SYS_ADMIN, SETUID, SETGID, NET_ADMIN, MKNOD, DAC_OVERRIDE]
  security_opt:
    - no-new-privileges:true
    - seccomp=unconfined
  cgroupns: host
  stop_grace_period: 45s
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:4096/api/health/ready"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 5s
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:rw
  environment: &judge-env
    RUSTBOX_WORKERS: "4"
    RUSTBOX_PORT: "4096"
    RUST_LOG: "info"

services:
  # Judge profile: tight limits (256MB, 7s wall) for competitive programming
  judge:
    <<: *judge-common
    ports:
      - "4096:4096"
    environment:
      <<: *judge-env
      RUSTBOX_DATABASE_URL: "sqlite:///tmp/rustbox.db"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./tests/config/config-judge.json:/etc/rustbox/config.json:ro

  # Executor profile: relaxed limits (2GB, 60s wall) for LLM agents
  executor:
    <<: *judge-common
    ports:
      - "4096:4096"
    environment:
      <<: *judge-env
      RUSTBOX_DATABASE_URL: "sqlite:///tmp/rustbox.db"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./tests/config/config-executor.json:/etc/rustbox/config.json:ro
    profiles:
      - executor

  # Judge with Postgres backend
  judge-postgres:
    <<: *judge-common
    ports:
      - "4096:4096"
    environment:
      <<: *judge-env
      RUSTBOX_DATABASE_URL: "postgresql://rustbox:rustbox@postgres:5432/rustbox"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./tests/config/config-judge.json:/etc/rustbox/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rustbox
      POSTGRES_PASSWORD: rustbox
      POSTGRES_DB: rustbox
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustbox"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - postgres

volumes:
  pg-data:

x-common: &common
  command: ["/usr/local/bin/judge-service"]
  cap_drop: [ALL]
  cap_add: [SYS_ADMIN, SETUID, SETGID, NET_ADMIN, MKNOD, DAC_OVERRIDE]
  security_opt:
    - no-new-privileges:true
    - seccomp=unconfined
  cgroupns: host
  stop_grace_period: 45s
  ports:
    - "4096:4096"
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:4096/api/health/ready"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 5s
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:rw
  environment: &env
    RUSTBOX_WORKERS: "4"
    RUSTBOX_PORT: "4096"
    RUST_LOG: "info"
    RUSTBOX_DATABASE_URL: "sqlite:///tmp/rustbox.db"

services:
  # docker compose up judge
  judge:
    <<: *common
    build: { context: ., dockerfile: Dockerfile }
    environment:
      <<: *env

  # docker compose up executor
  executor:
    <<: *common
    build: { context: ., dockerfile: Dockerfile.executor }
    environment:
      <<: *env

  # docker compose up judge-pg postgres
  judge-pg:
    <<: *common
    build: { context: ., dockerfile: Dockerfile }
    environment:
      <<: *env
      RUSTBOX_DATABASE_URL: "postgresql://rustbox:rustbox@postgres:5432/rustbox"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rustbox
      POSTGRES_PASSWORD: rustbox
      POSTGRES_DB: rustbox
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustbox"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data:

# cargo-deny configuration for rustbox
# Checks: advisories (CVEs), licenses, bans (duplicates), sources

[graph]
targets = [{ triple = "x86_64-unknown-linux-gnu" }]

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
    "BSL-1.0",
    "GPL-3.0-only",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
